# Pipeline Configuration Template
# Copy to your project root as pipeline.yaml and customize.

name: my-project
description: "Brief description of what this pipeline builds"
type: build                     # build (one-shot) | session (repeated per interaction)
max_cycles: 3                   # Max review-rebuild iterations
max_retries: 2                  # Max retries per agent on failure
max_duration: 60                # Wall-clock timeout in minutes (default 60)
# max_tokens: 500000            # Optional token budget — warns user when exceeded

# Phase definitions — executed in order
phases:
  - id: explore
    description: "Discover codebase structure, patterns, and integration points"
    agents:
      - agent: pipe-explorer
        model: sonnet
    output: context/

  - id: research
    description: "Evaluate existing solutions before building"
    agents:
      - agent: pipe-researcher
        model: haiku
        depends_on: [explore]
    output: context/
    # skip_if: "greenfield"     # Uncomment to skip for new projects

  # Uncomment for projects with UI/frontend work:
  # - id: design
  #   description: "Research visual references and produce design specification"
  #   agents:
  #     - agent: ui-architect
  #       model: sonnet
  #       depends_on: [explore]
  #   output: artifacts/design/

  - id: build
    description: "Implement the spec"
    agents:
      # Replace with your domain agents:
      - agent: my-builder
        model: sonnet
        depends_on: [explore]
        output: artifacts/build/
      # Add parallel agents:
      # - agent: my-other-builder
      #   model: sonnet
      #   parallel_with: my-builder
      #   output: artifacts/other/
    gate:
      agent: pipe-reviewer
      model: inherit
      pass_threshold: "PASS"
      fail_action: retry        # retry | stop | skip
      max_gate_cycles: 2

  # Uncomment for web apps with a deployed URL:
  # - id: test
  #   description: "Automated e2e testing via browser automation"
  #   agents:
  #     - agent: qa-tester
  #       model: sonnet
  #       depends_on: [build]
  #   output: artifacts/qa/

  # Uncomment for comprehensive QA sweep (runs agents in parallel):
  # - id: qa-sweep
  #   description: "Multi-agent QA audit — design, UX, security, content, accessibility"
  #   agents:
  #     - agent: qa-design
  #       model: sonnet
  #       depends_on: [build]
  #       output: artifacts/qa/
  #     - agent: qa-ux
  #       model: sonnet
  #       parallel_with: qa-design
  #       depends_on: [build]
  #       output: artifacts/qa/
  #     - agent: qa-security
  #       model: sonnet
  #       parallel_with: qa-design
  #       depends_on: [build]
  #       output: artifacts/qa/
  #     - agent: qa-content
  #       model: haiku
  #       parallel_with: qa-design
  #       depends_on: [build]
  #       output: artifacts/qa/
  #     - agent: qa-accessibility
  #       model: sonnet
  #       parallel_with: qa-design
  #       depends_on: [build]
  #       output: artifacts/qa/
  #   gate:
  #     agent: pipe-reviewer
  #     model: inherit
  #     pass_threshold: "PASS"
  #     fail_action: retry
  #     max_gate_cycles: 3

  # - id: deploy
  #   description: "Deploy the build"
  #   agents:
  #     - agent: my-deployer
  #       model: haiku
  #       depends_on: [build]
  #       requires_approval: true
  #   output: artifacts/deployment/

# Model routing — override per-agent model for cost optimization
# model_routing:
#   haiku: [lightweight-agent]
#   sonnet: [complex-agent]

# Issue bus config
issue_bus:
  enabled: true
  max_redispatch: 2
  types:
    - MISMATCH
    - MISSING
    - CONFLICT
    - DESIGN_DEVIATION       # ui-builder output doesn't match ui-architect spec

# Artifact conventions
# {session} is replaced at runtime by the orchestrator — do not change this pattern
artifacts:
  base_dir: .claude/pipeline/sessions/{session}/artifacts/
